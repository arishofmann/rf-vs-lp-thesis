# Linear Probing: Train Portugal → Test Finland (out-of-distribution)
seed_everything: 42
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  max_epochs: 50
  callbacks:
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/loss
        patience: 10
        mode: min

data:
  class_path: terratorch.datamodules.EmbeddingClassificationDataModule
  init_args:
    batch_size: 256
    num_workers: 4
    train_data_root: ./embeddings/portugal/train
    val_data_root: ./embeddings/portugal/validation
    test_data_root: ./embeddings/finland/test

model:
  class_path: terratorch.tasks.MultiLabelClassificationTask
  init_args:
    model_factory: EncoderDecoderFactory
    model_args:
      backbone: IdentityBackbone
      backbone_out_channels: [768]
      decoder: IdentityDecoder
      num_classes: 19
    loss: bce
    freeze_backbone: true
    freeze_decoder: true
    class_names:
      - Agro-forestry areas
      - Arable land
      - Beaches, dunes, sands
      - Broad-leaved forest
      - Coastal wetlands
      - Complex cultivation patterns
      - Coniferous forest
      - Industrial or commercial units
      - Inland waters
      - Inland wetlands
      - Land principally occupied by agriculture, with significant areas of natural vegetation
      - Marine waters
      - Mixed forest
      - Moors, heathland and sclerophyllous vegetation
      - Natural grassland and sparsely vegetated areas
      - Pastures
      - Permanent crops
      - Transitional woodland, shrub
      - Urban fabric

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1.e-3

lr_scheduler:
  class_path: ReduceLROnPlateau
  init_args:
    monitor: val/loss
    factor: 0.5
    patience: 5
